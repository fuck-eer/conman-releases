name: Preview Deployment

on:
  push:
    branches:
      - release-*

concurrency:
  group: preview-${{ github.ref_name }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Preview
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Alias Preview Deployment
        id: alias
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          ALIAS_NAME="${BRANCH_NAME}-conman-releases.vercel.app"
          vercel alias ${{ steps.deploy.outputs.url }} "$ALIAS_NAME" --token=${{ secrets.VERCEL_TOKEN }}
          echo "alias=https://$ALIAS_NAME" >> "$GITHUB_OUTPUT"

      - name: Find Associated Pull Request
        id: find-pr
        uses: actions/github-script@v7
        with:
          script: |
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${context.ref.replace('refs/heads/', '')}`,
              state: 'open'
            });
            if (pulls.data.length > 0) {
              core.setOutput('pr_number', pulls.data[0].number);
              core.setOutput('has_pr', 'true');
            } else {
              core.setOutput('has_pr', 'false');
            }

      - name: Comment Preview URL on PR
        if: steps.find-pr.outputs.has_pr == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.find-pr.outputs.pr_number }};
            const previewUrl = '${{ steps.alias.outputs.alias }}';
            const deployUrl = '${{ steps.deploy.outputs.url }}';
            const marker = '<!-- vercel-preview-comment -->';

            const body = `${marker}
            ### Vercel Preview Deployment

            | Name | Link |
            |------|------|
            | **Preview** | [${previewUrl}](${previewUrl}) |
            | **Deployment** | [${deployUrl}](${deployUrl}) |

            **Branch:** \`${{ github.ref_name }}\`
            **Commit:** \`${context.sha.substring(0, 7)}\`

            _Updated: ${new Date().toISOString()}_`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Set Commit Status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              target_url: '${{ steps.alias.outputs.alias }}',
              description: 'Preview deployment ready',
              context: 'Vercel Preview'
            });
