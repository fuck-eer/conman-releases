name: Cleanup Preview Deployment

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - stage

jobs:
  cleanup:
    if: startsWith(github.head_ref, 'release-')
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Remove Preview Alias
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          ALIAS_NAME="${BRANCH_NAME}-conman-releases.vercel.app"
          vercel alias rm "$ALIAS_NAME" --yes --token=${{ secrets.VERCEL_TOKEN }} || true
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Remove Preview Deployments
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ github.head_ref }}';
            const token = '${{ secrets.VERCEL_TOKEN }}';
            const projectId = '${{ secrets.VERCEL_PROJECT_ID }}';

            const resp = await fetch(
              `https://api.vercel.com/v6/deployments?projectId=${projectId}&meta-githubCommitRef=${branch}&limit=20`,
              { headers: { Authorization: `Bearer ${token}` } }
            );

            if (!resp.ok) {
              console.log(`Failed to list deployments: ${resp.status}`);
              return;
            }

            const { deployments } = await resp.json();
            console.log(`Found ${deployments.length} deployments for branch ${branch}`);

            for (const d of deployments) {
              console.log(`Deleting deployment ${d.uid} (${d.url})`);
              const del = await fetch(
                `https://api.vercel.com/v13/deployments/${d.uid}`,
                { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } }
              );
              console.log(`  -> ${del.status}`);
            }

      - name: Comment Cleanup on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- vercel-preview-comment -->';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              const action = context.payload.pull_request.merged ? 'merged' : 'closed';
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: `${marker}\n### Vercel Preview Deployment\n\n> Preview deployment has been removed (PR ${action}).`,
              });
            }
