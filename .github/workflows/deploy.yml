name: Deploy

on:
  push:
    branches:
      - main
      - stage

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Vercel secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN is empty or not set. Add it under Repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error::VERCEL_ORG_ID and VERCEL_PROJECT_ID must be set in Actions secrets."
            exit 1
          fi

      - name: Link Vercel project (CI)
        run: |
          mkdir -p .vercel
          printf '%s\n' "{\"orgId\":\"${VERCEL_ORG_ID}\",\"projectId\":\"${VERCEL_PROJECT_ID}\"}" > .vercel/project.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Pull Vercel Environment
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          else
            vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          fi

      - name: Build
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            vercel build --prod --token="$VERCEL_TOKEN"
          else
            vercel build --token="$VERCEL_TOKEN"
          fi

      - name: Deploy to Production
        if: github.ref_name == 'main'
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Staging
        if: github.ref_name == 'stage'
        id: staging-deploy
        run: |
          URL=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Alias Staging Deployment
        if: github.ref_name == 'stage'
        run: vercel alias "${{ steps.staging-deploy.outputs.url }}" staging-conman-releases.vercel.app --token="$VERCEL_TOKEN"
